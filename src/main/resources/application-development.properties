#Application Name
spring.application.name=library.management

#Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/library_management
spring.datasource.username=root
spring.datasource.password=
#tells Java which driver to use to talk to MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA = Java Persistence API
#Hibernate = JPA implementation used by Spring Boot
#Controls how Hibernate handles database tables
#other options
#1. none - Do nothing
#2. validate - Only validate schema
#3. update - Update tables automatically
#4. create - Drop & create tables every startup
#5. create-drop - Create on start, drop on shutdown
spring.jpa.hibernate.ddl-auto=update
#prints SQL queries in console
spring.jpa.show-sql=true
#tells Hibernate, Generate SQL compatible with MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Error Handling
#Includes exception messages in HTTP error responses
server.error.include-message=always

